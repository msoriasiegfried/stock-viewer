<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Control de Stock — Siegfried</title>
<style>
:root{
  --red:#8B1A2B; --red-dark:#6e1522; --red-light:#f9f0f1;
  --bg:#f0f2f5; --white:#ffffff; --border:#dde3ea;
  --text:#1a202c; --muted:#64748b; --subtle:#f8fafc;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;}

/* HEADER */
header{
  background:var(--white);
  border-bottom:3px solid var(--red);
  padding:14px 32px;
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
  position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:14px;}
.logo-box{
  width:44px;height:44px;border-radius:8px;
  background:var(--red);
  display:flex;align-items:center;justify-content:center;
}
.logo-box svg{width:26px;height:26px;fill:white;}
.logo-text{display:flex;flex-direction:column;}
.logo-name{font-size:1.1rem;font-weight:800;color:var(--red);letter-spacing:1.5px;}
.logo-sub{font-size:.7rem;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;}
.updated-pill{
  background:var(--red-light);color:var(--red);
  padding:5px 14px;border-radius:20px;
  font-size:.74rem;font-weight:600;border:1px solid rgba(139,26,43,.15);
}

/* STATS BAR */
.statsbar{
  background:var(--red);
  display:flex;
}
.stat{
  padding:12px 28px;color:white;
  border-right:1px solid rgba(255,255,255,.18);
  flex:1;
}
.stat:last-child{border:none;}
.stat-n{font-size:1.6rem;font-weight:800;line-height:1;letter-spacing:-.5px;}
.stat-l{font-size:.65rem;opacity:.8;text-transform:uppercase;letter-spacing:.7px;margin-top:3px;}

/* CONTROLES */
.controls{
  background:var(--white);
  border-bottom:1px solid var(--border);
  padding:14px 32px;
  display:flex;flex-wrap:wrap;gap:12px;align-items:center;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.search-wrap{position:relative;}
.search-wrap input{
  padding:8px 14px 8px 36px;
  border:1.5px solid var(--border);border-radius:8px;
  font-size:.85rem;width:270px;outline:none;
  transition:border .2s,box-shadow .2s;background:var(--subtle);
}
.search-wrap input:focus{border-color:var(--red);background:white;box-shadow:0 0 0 3px rgba(139,26,43,.08);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.85rem;}
.vsep{width:1px;height:28px;background:var(--border);}
.fg{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.fl{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
.tabs{display:flex;gap:5px;flex-wrap:wrap;}
.tab{
  padding:5px 13px;border-radius:16px;
  border:1.5px solid var(--border);background:var(--subtle);
  color:var(--muted);font-size:.76rem;cursor:pointer;
  transition:all .15s;font-weight:500;white-space:nowrap;
}
.tab:hover{border-color:var(--red);color:var(--red);background:var(--red-light);}
.tab.active{background:var(--red);color:white;border-color:var(--red);box-shadow:0 2px 6px rgba(139,26,43,.3);}
.count-badge{
  margin-left:auto;background:var(--red-light);color:var(--red);
  padding:5px 16px;border-radius:20px;font-size:.8rem;font-weight:700;
  border:1px solid rgba(139,26,43,.15);white-space:nowrap;
}

/* TABLA */
.tbl-wrap{overflow-x:auto;padding:20px 32px 48px;}
table{
  border-collapse:collapse;width:100%;
  background:var(--white);border-radius:12px;
  overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.07);
  font-size:.8rem;
}
thead th{
  background:#1a202c;color:#cbd5e0;
  padding:11px 14px;text-align:left;
  white-space:nowrap;cursor:pointer;user-select:none;
  font-size:.72rem;font-weight:700;letter-spacing:.4px;
  border-right:1px solid rgba(255,255,255,.06);
}
thead th:last-child{border-right:none;}
thead th:hover{background:#2d3748;}
thead th.asc::after{content:' ↑';color:#fc8181;}
thead th.desc::after{content:' ↓';color:#fc8181;}

tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:#fdf6f7;}
tbody tr:nth-child(even){background:#fafbfc;}
tbody tr:nth-child(even):hover{background:#fdf6f7;}

td{
  padding:9px 14px;
  border-right:1px solid var(--border);
  white-space:nowrap;
}
td:last-child{border-right:none;}
td.n{text-align:right;font-variant-numeric:tabular-nums;font-family:'Consolas',monospace;font-size:.78rem;}
td.desc-col{white-space:normal;line-height:1.35;max-width:260px;font-weight:500;}
td.danger{color:#b91c1c;font-weight:700;}
td.warn{color:#b45309;font-weight:600;}
td.ok{color:#15803d;font-weight:600;}
td.pct-col{text-align:right;font-size:.78rem;}
tr.row-danger td:first-child{border-left:3px solid #ef4444;}
tr.row-warn td:first-child{border-left:3px solid #f59e0b;}
tr.row-danger{background:#fff5f5!important;}
tr.row-warn{background:#fffbeb!important;}
tr.row-danger:hover{background:#fee2e2!important;}
tr.row-warn:hover{background:#fef3c7!important;}

.obs-cell{max-width:180px;overflow:hidden;text-overflow:ellipsis;color:var(--muted);font-size:.76rem;font-style:italic;}

.empty{text-align:center;padding:80px;color:var(--muted);}
.empty-icon{font-size:3rem;margin-bottom:12px;}
.empty p{font-size:.9rem;}

@media(max-width:768px){
  header{padding:10px 16px;}
  .statsbar .stat{padding:8px 14px;}
  .stat-n{font-size:1.2rem;}
  .controls{padding:10px 16px;}
  .tbl-wrap{padding:12px 8px 32px;}
  .search-wrap input{width:100%;}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-box">
      <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 4 C10 4 4 10 4 18 C4 24 8 28 14 30 L14 36 L26 36 L26 30 C32 28 36 24 36 18 C36 10 30 4 20 4Z" fill="white" opacity=".9"/>
        <text x="20" y="25" text-anchor="middle" font-size="14" font-weight="800" fill="#8B1A2B" font-family="Segoe UI">SF</text>
      </svg>
    </div>
    <div class="logo-text">
      <span class="logo-name">SIEGFRIED</span>
      <span class="logo-sub">Control de Stock</span>
    </div>
  </div>
  <div class="updated-pill">📅 Actualizado: __LAST_UPDATE__</div>
</header>

<div class="statsbar">
  <div class="stat"><div class="stat-n" id="sTotal">—</div><div class="stat-l">Productos</div></div>
  <div class="stat"><div class="stat-n" id="sCentros">—</div><div class="stat-l">Centros</div></div>
  <div class="stat"><div class="stat-n" id="sCritico">—</div><div class="stat-l">Crítico &lt;30 días</div></div>
  <div class="stat"><div class="stat-n" id="sAlerta">—</div><div class="stat-l">Alerta 30–60 días</div></div>
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="q" placeholder="Buscar descripción, familia..." oninput="apply()"/>
  </div>
  <div class="vsep"></div>
  <div class="fg">
    <span class="fl">Línea:</span>
    <div class="tabs" id="tabLinea"></div>
  </div>
  <div class="vsep"></div>
  <div class="fg">
    <span class="fl">Centro:</span>
    <div class="tabs" id="tabCentro"></div>
  </div>
  <div class="vsep"></div>
  <div class="fg">
    <span class="fl">Gran Familia:</span>
    <div class="tabs" id="tabFamilia"></div>
  </div>
  <span class="count-badge" id="badge">— registros</span>
</div>

<div class="tbl-wrap">
  <table>
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty" id="empty" style="display:none">
    <div class="empty-icon">📭</div>
    <p>Sin resultados para esta búsqueda.</p>
  </div>
</div>

<script>
const ALL = __DATA__;
const COLS = __COLUMNS__;

// Columnas a mostrar en tabla (ocultamos Centro, Gran Familia, Familia, Linea — solo para filtros)
const SHOW_COLS = ['Rofina','Descripcion','Stock','Ventas/Dia','Pct','Est VTA','Dias Est','Cuarentena','Lotes Transito','Observaciones'];
const COL_LABELS = {
  'Rofina':'Rofina',
  'Descripcion':'Descripción',
  'Stock':'Stock',
  'Ventas/Dia':'Vtas/Día',
  'Pct':'%',
  'Est VTA':'Est. VTA',
  'Dias Est':'Días/Est.',
  'Cuarentena':'Cuarentena',
  'Lotes Transito':'Lotes Tránsito',
  'Observaciones':'Observaciones',
};
const NUM_COLS = new Set(['Stock','Ventas/Dia','Est VTA','Cuarentena','Lotes Transito']);
const INT_COLS = new Set(['Dias Est','Cuarentena','Lotes Transito']);

let data = [...ALL], sortCol = null, sortAsc = true;
let fLinea='Todas', fCentro='Todos', fFamilia='Todas';

function fmt(val, col) {
  if (val===''||val===null||val===undefined) return '—';
  if (col==='Pct') return parseFloat(val).toFixed(1) + '%';
  if (INT_COLS.has(col)) return Math.round(parseFloat(val)).toLocaleString('es-AR');
  if (NUM_COLS.has(col)) return parseFloat(val).toLocaleString('es-AR',{maximumFractionDigits:0});
  if (col==='Est VTA') return parseFloat(val).toLocaleString('es-AR',{maximumFractionDigits:0});
  return val;
}

function stats(rows) {
  document.getElementById('sTotal').textContent = rows.length.toLocaleString('es-AR');
  document.getElementById('sCentros').textContent = new Set(rows.map(r=>r.Centro)).size;
  const critico = rows.filter(r=>{ const d=parseFloat(r['Dias Est']); return !isNaN(d)&&d>0&&d<30; }).length;
  const alerta = rows.filter(r=>{ const d=parseFloat(r['Dias Est']); return !isNaN(d)&&d>=30&&d<60; }).length;
  document.getElementById('sCritico').textContent = critico;
  document.getElementById('sAlerta').textContent = alerta;
}

function mkTabs(id, vals, allLabel, getter, setter) {
  const el = document.getElementById(id);
  el.innerHTML='';
  [allLabel,...vals].forEach(v=>{
    const b = document.createElement('button');
    b.className = 'tab'+(v===getter()?' active':'');
    b.textContent = v;
    b.onclick = e=>{
      setter(v);
      el.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      e.target.classList.add('active');
      apply();
    };
    el.appendChild(b);
  });
}

const lineas = [...new Set(ALL.map(r=>r.Linea).filter(Boolean))].sort();
const centros = [...new Set(ALL.map(r=>String(r.Centro)).filter(Boolean))].sort((a,b)=>Number(a)-Number(b));
const familias = [...new Set(ALL.map(r=>r['Gran Familia']).filter(v=>v&&v!=='-'))].sort();

mkTabs('tabLinea', lineas, 'Todas', ()=>fLinea, v=>fLinea=v);
mkTabs('tabCentro', centros, 'Todos', ()=>fCentro, v=>fCentro=v);
mkTabs('tabFamilia', familias, 'Todas', ()=>fFamilia, v=>fFamilia=v);

// Build header
const thead = document.getElementById('thead');
const htr = document.createElement('tr');
SHOW_COLS.forEach((col,i)=>{
  const th = document.createElement('th');
  th.textContent = COL_LABELS[col]||col;
  th.onclick = ()=>sortBy(col,th);
  htr.appendChild(th);
});
thead.appendChild(htr);

function apply() {
  const q = document.getElementById('q').value.toLowerCase();
  let rows = data.filter(r=>{
    if (fLinea!=='Todas' && r.Linea!==fLinea) return false;
    if (fCentro!=='Todos' && String(r.Centro)!==fCentro) return false;
    if (fFamilia!=='Todas' && r['Gran Familia']!==fFamilia) return false;
    if (q && !COLS.some(c=>String(r[c]||'').toLowerCase().includes(q))) return false;
    return true;
  });
  render(rows);
}

function render(rows) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML='';
  document.getElementById('empty').style.display = rows.length?'none':'block';
  document.getElementById('badge').textContent = rows.length.toLocaleString('es-AR')+' registros';
  stats(rows);

  rows.forEach(row=>{
    const tr = document.createElement('tr');
    const dias = parseFloat(row['Dias Est']);
    if (!isNaN(dias)&&dias>0&&dias<30) tr.classList.add('row-danger');
    else if (!isNaN(dias)&&dias>=30&&dias<60) tr.classList.add('row-warn');

    SHOW_COLS.forEach(col=>{
      const td = document.createElement('td');
      const raw = row[col];
      const display = fmt(raw, col);

      if (col==='Descripcion') {
        td.className='desc-col'; td.textContent=display;
      } else if (col==='Pct') {
        td.className='pct-col n';
        td.textContent = display;
      } else if (col==='Dias Est') {
        const n = parseFloat(raw);
        td.className = 'n '+(isNaN(n)||n<=0?'':n<30?'danger':n<60?'warn':'ok');
        td.textContent = display;
      } else if (NUM_COLS.has(col)||INT_COLS.has(col)) {
        td.className='n'; td.textContent=display;
      } else if (col==='Observaciones') {
        td.className='obs-cell'; td.textContent=display; td.title=display;
      } else {
        td.textContent=display;
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

function sortBy(col, th) {
  sortAsc = sortCol===col?!sortAsc:true;
  sortCol = col;
  document.querySelectorAll('thead th').forEach(t=>t.classList.remove('asc','desc'));
  th.classList.add(sortAsc?'asc':'desc');
  data = [...data].sort((a,b)=>{
    const av=a[col]??'', bv=b[col]??'';
    const an=parseFloat(av), bn=parseFloat(bv);
    if (!isNaN(an)&&!isNaN(bn)) return sortAsc?an-bn:bn-an;
    return sortAsc?String(av).localeCompare(String(bv)):String(bv).localeCompare(String(av));
  });
  apply();
}

apply();
</script>
</body>
</html>
