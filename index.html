<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Control de Stock — Siegfried</title>
<style>
:root { --red:#C8102E; --red-dark:#a00d24; --red-light:#fff0f2; --bg:#f4f6f8; --border:#e2e8f0; --text:#1a202c; --muted:#64748b; }
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);}

header{background:white;border-bottom:3px solid var(--red);padding:12px 28px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.logo{display:flex;align-items:center;gap:12px;}
.logo-icon{width:40px;height:40px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:.95rem;}
.logo-name{font-size:1.15rem;font-weight:800;color:var(--red);letter-spacing:1px;}
.logo-sub{font-size:.72rem;color:var(--muted);letter-spacing:.3px;}
.updated{font-size:.76rem;background:var(--red-light);color:var(--red);padding:4px 12px;border-radius:20px;font-weight:600;}

.statsbar{background:var(--red);display:flex;gap:0;overflow:hidden;}
.stat{padding:10px 24px;border-right:1px solid rgba(255,255,255,.15);color:white;}
.stat:last-child{border:none;}
.stat-n{font-size:1.4rem;font-weight:700;line-height:1;}
.stat-l{font-size:.68rem;opacity:.85;text-transform:uppercase;letter-spacing:.6px;margin-top:2px;}

.controls{background:white;border-bottom:1px solid var(--border);padding:12px 28px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.search-box{position:relative;}
.search-box input{padding:7px 12px 7px 34px;border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;width:260px;outline:none;transition:border .2s;}
.search-box input:focus{border-color:var(--red);}
.search-box::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:.8rem;}

.sep{width:1px;height:26px;background:var(--border);}
.filter-group{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.filter-label{font-size:.76rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;}
.tabs{display:flex;gap:5px;flex-wrap:wrap;}
.tab{padding:5px 12px;border-radius:16px;border:1.5px solid var(--border);background:white;color:var(--muted);font-size:.77rem;cursor:pointer;transition:all .15s;font-weight:500;white-space:nowrap;}
.tab:hover{border-color:var(--red);color:var(--red);}
.tab.active{background:var(--red);color:white;border-color:var(--red);}

.badge{margin-left:auto;background:var(--red-light);color:var(--red);padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:600;white-space:nowrap;}

.tbl-wrap{overflow-x:auto;padding:16px 28px 40px;}
table{border-collapse:collapse;width:100%;background:white;border-radius:10px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.07);font-size:.8rem;}
thead th{background:#1a202c;color:#e2e8f0;padding:10px 12px;text-align:left;white-space:nowrap;cursor:pointer;user-select:none;font-size:.74rem;font-weight:600;letter-spacing:.3px;}
thead th:hover{background:#2d3748;}
thead th.asc::after{content:' ↑';color:var(--red);}
thead th.desc::after{content:' ↓';color:var(--red);}
tbody tr{border-bottom:1px solid #f1f5f9;transition:background .1s;}
tbody tr:hover{background:var(--red-light);}
td{padding:8px 12px;white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis;}
td.n{text-align:right;font-variant-numeric:tabular-nums;color:#334155;}
td.desc-col{max-width:280px;white-space:normal;line-height:1.3;}
td.danger{color:#dc2626;font-weight:700;}
td.warn{color:#d97706;font-weight:600;}
td.ok{color:#16a34a;font-weight:600;}
td.badge-cell span{background:var(--red-light);color:var(--red);padding:2px 8px;border-radius:10px;font-size:.72rem;font-weight:600;}
tr.row-danger td:first-child{border-left:3px solid #dc2626;}
tr.row-warn td:first-child{border-left:3px solid #f59e0b;}
.empty{text-align:center;padding:60px;color:var(--muted);}
.empty-icon{font-size:2.5rem;margin-bottom:10px;}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">SF</div>
    <div>
      <div class="logo-name">SIEGFRIED</div>
      <div class="logo-sub">Control de Stock</div>
    </div>
  </div>
  <div class="updated">📅 Actualizado: __LAST_UPDATE__</div>
</header>

<div class="statsbar">
  <div class="stat"><div class="stat-n" id="sTotal">—</div><div class="stat-l">Productos</div></div>
  <div class="stat"><div class="stat-n" id="sCentros">—</div><div class="stat-l">Centros</div></div>
  <div class="stat"><div class="stat-n" id="sCritico">—</div><div class="stat-l">Crítico &lt;30 días</div></div>
  <div class="stat"><div class="stat-n" id="sAlerta">—</div><div class="stat-l">Alerta 30-60 días</div></div>
  <div class="stat"><div class="stat-n" id="sSolicitud">—</div><div class="stat-l">Con solicitud</div></div>
</div>

<div class="controls">
  <div class="search-box">
    <input type="text" id="q" placeholder="Buscar descripción, código, familia..." oninput="apply()"/>
  </div>
  <div class="sep"></div>
  <div class="filter-group">
    <span class="filter-label">Línea:</span>
    <div class="tabs" id="tabLinea"></div>
  </div>
  <div class="sep"></div>
  <div class="filter-group">
    <span class="filter-label">Centro:</span>
    <div class="tabs" id="tabCentro"></div>
  </div>
  <div class="sep"></div>
  <div class="filter-group">
    <span class="filter-label">Gran Familia:</span>
    <div class="tabs" id="tabFamilia"></div>
  </div>
  <div class="badge" id="badge">— registros</div>
</div>

<div class="tbl-wrap">
  <table>
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty" id="empty" style="display:none">
    <div class="empty-icon">📭</div>Sin resultados para esta búsqueda.
  </div>
</div>

<script>
const ALL = __DATA__;
const COLS = __COLUMNS__;
const NUM = new Set(['Stock','Ventas/Dia','Pct','Est VTA','Dias Est','VTA Prom 3m','Dias Prom3','Cuarentena','Lotes Transito']);

let data = ALL, sortCol = null, sortAsc = true;
let fLinea = 'Todas', fCentro = 'Todos', fFamilia = 'Todas';

// Stats
function stats(rows) {
  document.getElementById('sTotal').textContent = rows.length;
  document.getElementById('sCentros').textContent = new Set(rows.map(r=>r.Centro)).size;
  document.getElementById('sCritico').textContent = rows.filter(r=>{ const d=parseFloat(r['Dias Est']); return !isNaN(d)&&d>0&&d<30; }).length;
  document.getElementById('sAlerta').textContent = rows.filter(r=>{ const d=parseFloat(r['Dias Est']); return !isNaN(d)&&d>=30&&d<60; }).length;
  document.getElementById('sSolicitud').textContent = rows.filter(r=>r['Solicitud']==='Pedir').length;
}

// Build tabs
function mkTabs(id, vals, all_label, cur, setter) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  [all_label, ...vals].forEach(v => {
    const b = document.createElement('button');
    b.className = 'tab' + (v===cur?' active':'');
    b.textContent = v;
    b.onclick = e => {
      setter(v);
      el.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      e.target.classList.add('active');
      apply();
    };
    el.appendChild(b);
  });
}

const lineas = [...new Set(ALL.map(r=>r.Linea).filter(Boolean))].sort();
const centros = [...new Set(ALL.map(r=>r.Centro).filter(Boolean))].sort();
const familias = [...new Set(ALL.map(r=>r['Gran Familia']).filter(v=>v&&v!=='-'))].sort();

mkTabs('tabLinea', lineas, 'Todas', fLinea, v=>fLinea=v);
mkTabs('tabCentro', centros, 'Todos', fCentro, v=>fCentro=v);
mkTabs('tabFamilia', familias, 'Todas', fFamilia, v=>fFamilia=v);

// Header
const thead = document.getElementById('thead');
const htr = document.createElement('tr');
COLS.forEach((col,i) => {
  const th = document.createElement('th');
  const labels = {
    'Centro':'Centro','Rofina':'Rofina','Siegfried':'Cód. Siegfried','Descripcion':'Descripción',
    'Stock':'Stock','Ventas/Dia':'Vtas/Día','Pct':'%','Est VTA':'Est. VTA',
    'Dias Est':'Días/Est.','VTA Prom 3m':'VTA Prom 3m','Dias Prom3':'Días/Prom3',
    'Cuarentena':'Cuarentena','Lotes Transito':'Lotes Tránsito','Solicitud':'Solicitud',
    'Observaciones':'Observaciones','Gran Familia':'Gran Familia','Familia':'Familia','Linea':'Línea'
  };
  th.textContent = labels[col]||col;
  th.onclick = ()=>sortBy(i,th);
  htr.appendChild(th);
});
thead.appendChild(htr);

function apply() {
  const q = document.getElementById('q').value.toLowerCase();
  let rows = data.filter(r => {
    if (fLinea!=='Todas' && r.Linea!==fLinea) return false;
    if (fCentro!=='Todos' && r.Centro!==fCentro) return false;
    if (fFamilia!=='Todas' && r['Gran Familia']!==fFamilia) return false;
    if (q && !COLS.some(c=>String(r[c]||'').toLowerCase().includes(q))) return false;
    return true;
  });
  render(rows);
}

function render(rows) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  document.getElementById('empty').style.display = rows.length?'none':'block';
  document.getElementById('badge').textContent = rows.length + ' registros';
  stats(rows);
  rows.forEach(row => {
    const tr = document.createElement('tr');
    const dias = parseFloat(row['Dias Est']||0);
    if (!isNaN(dias)&&dias>0&&dias<30) tr.classList.add('row-danger');
    else if (!isNaN(dias)&&dias>=30&&dias<60) tr.classList.add('row-warn');
    COLS.forEach(col => {
      const td = document.createElement('td');
      const val = row[col]??'';
      if (NUM.has(col)) {
        td.className='n';
        td.textContent = val;
        if (col==='Dias Est'||col==='Dias Prom3') {
          const n = parseFloat(val);
          if (!isNaN(n)) {
            if (n>0&&n<30) td.className='n danger';
            else if (n>=30&&n<60) td.className='n warn';
            else if (n>=60) td.className='n ok';
          }
        }
      } else if (col==='Descripcion') {
        td.className='desc-col'; td.textContent=val;
      } else if (col==='Solicitud'&&val==='Pedir') {
        td.className='badge-cell'; td.innerHTML='<span>Pedir</span>';
      } else {
        td.textContent=val;
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

function sortBy(ci, th) {
  const col = COLS[ci];
  sortAsc = sortCol===col?!sortAsc:true;
  sortCol = col;
  document.querySelectorAll('thead th').forEach(t=>t.classList.remove('asc','desc'));
  th.classList.add(sortAsc?'asc':'desc');
  data = [...data].sort((a,b)=>{
    const av=a[col]??'', bv=b[col]??'';
    const an=parseFloat(av), bn=parseFloat(bv);
    if (!isNaN(an)&&!isNaN(bn)) return sortAsc?an-bn:bn-an;
    return sortAsc?String(av).localeCompare(String(bv)):String(bv).localeCompare(String(av));
  });
  apply();
}

apply();
</script>
</body>
</html>
