<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Control de Stock — Siegfried</title>
<style>
:root{
  --red:#8B1A2B;--red-dark:#6e1522;--red-light:#f9f0f1;
  --bg:#f0f2f5;--white:#fff;--border:#dde3ea;
  --text:#1a202c;--muted:#64748b;--subtle:#f8fafc;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;}

header{
  background:var(--white);border-bottom:3px solid var(--red);
  padding:12px 28px;display:flex;justify-content:space-between;align-items:center;
  box-shadow:0 2px 10px rgba(0,0,0,.06);position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:12px;}
.logo img{height:44px;width:auto;}
.logo-text .logo-name{font-size:1.1rem;font-weight:800;color:var(--red);letter-spacing:1.5px;}
.logo-text .logo-sub{font-size:.68rem;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;}
.updated-pill{
  background:var(--red-light);color:var(--red);
  padding:5px 14px;border-radius:20px;font-size:.74rem;font-weight:600;
  border:1px solid rgba(139,26,43,.15);
}

.statsbar{background:var(--red);display:flex;}
.stat{padding:11px 22px;color:white;border-right:1px solid rgba(255,255,255,.18);flex:1;}
.stat:last-child{border:none;}
.stat-n{font-size:1.5rem;font-weight:800;line-height:1;letter-spacing:-.5px;}
.stat-l{font-size:.62rem;opacity:.8;text-transform:uppercase;letter-spacing:.7px;margin-top:2px;}

.controls{
  background:var(--white);border-bottom:1px solid var(--border);
  padding:12px 28px;display:flex;flex-direction:column;gap:10px;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.ctrl-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.search-wrap{position:relative;}
.search-wrap input{
  padding:8px 14px 8px 36px;border:1.5px solid var(--border);
  border-radius:8px;font-size:.85rem;width:260px;outline:none;
  transition:border .2s,box-shadow .2s;background:var(--subtle);
}
.search-wrap input:focus{border-color:var(--red);background:white;box-shadow:0 0 0 3px rgba(139,26,43,.08);}
.search-wrap::before{content:'🔍';position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:.8rem;}
.vsep{width:2px;height:28px;background:linear-gradient(180deg,rgba(221,227,234,.3) 0%,rgba(221,227,234,.8) 50%,rgba(221,227,234,.3) 100%);flex-shrink:0;margin:0 8px;}
.fg{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.fl{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
.tabs{display:flex;gap:4px;flex-wrap:wrap;}
.tab{
  padding:5px 12px;border-radius:16px;border:1.5px solid var(--border);
  background:var(--subtle);color:var(--muted);font-size:.74rem;
  cursor:pointer;transition:all .15s;font-weight:500;white-space:nowrap;
}
.tab:hover{border-color:var(--red);color:var(--red);background:var(--red-light);}
.tab.active{background:var(--red);color:white;border-color:var(--red);box-shadow:0 2px 6px rgba(139,26,43,.25);}
.tab.critico-btn{border-color:#dc2626;color:#dc2626;background:#fff5f5;font-weight:700;}
.tab.critico-btn.active{background:#dc2626;border-color:#dc2626;color:white;box-shadow:0 2px 6px rgba(220,38,38,.3);}
.count-badge{
  margin-left:auto;background:var(--red-light);color:var(--red);
  padding:5px 16px;border-radius:20px;font-size:.78rem;font-weight:700;
  border:1px solid rgba(139,26,43,.15);white-space:nowrap;
}

.tbl-wrap{overflow-x:auto;padding:16px 28px 48px;}
table{
  border-collapse:collapse;width:100%;background:var(--white);
  border-radius:12px;overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,.07);font-size:.79rem;
}
thead th{
  background:#1a202c;color:#cbd5e0;padding:10px 13px;
  text-align:left;white-space:nowrap;cursor:pointer;user-select:none;
  font-size:.71rem;font-weight:700;letter-spacing:.4px;
  border-right:1px solid rgba(255,255,255,.07);
}
thead th:last-child{border-right:none;}
thead th:hover{background:#2d3748;}
thead th.asc::after{content:' ↑';color:#fc8181;}
thead th.desc::after{content:' ↓';color:#fc8181;}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:#fdf5f6;}
tbody tr:nth-child(even){background:#fafbfc;}
tbody tr:nth-child(even):hover{background:#fdf5f6;}
tbody tr.row-danger{background:#fff5f5!important;}
tbody tr.row-danger:hover{background:#fee2e2!important;}
tbody tr.row-danger td:first-child{border-left:3px solid #ef4444;}
tbody tr.row-warn{background:#fffbeb!important;}
tbody tr.row-warn:hover{background:#fef3c7!important;}
tbody tr.row-warn td:first-child{border-left:3px solid #f59e0b;}
td{padding:8px 13px;border-right:1px solid #edf0f4;white-space:nowrap;}
td:last-child{border-right:none;}
td.n{text-align:right;font-variant-numeric:tabular-nums;font-family:'Consolas',monospace;font-size:.77rem;color:#334155;}
td.desc-col{white-space:normal;line-height:1.35;max-width:280px;font-weight:500;}
td.obs-col{white-space:normal;line-height:1.4;max-width:380px;color:var(--muted);font-size:.74rem;word-wrap:break-word;}
td.danger{color:#b91c1c;font-weight:700;}
td.warn{color:#b45309;font-weight:600;}
td.ok{color:#15803d;font-weight:600;}
.empty{text-align:center;padding:80px;color:var(--muted);}
.empty-icon{font-size:2.8rem;margin-bottom:10px;}
</style>
</head>
<body>

<header>
  <div class="logo">
   <img src="https://media.licdn.com/dms/image/v2/C4D0BAQEoRXcgOoX8eg/company-logo_200_200/company-logo_200_200/0/1652730522114/investifarma_logo?e=2147483647&v=beta&t=m8TfZspSp4nAnWUXiZG3ABK28hTyRZ_5IcTBt23wZ1w" alt="Siegfried" style="height:50px;"/>
    <div class="logo-text">
      <div class="logo-name">SIEGFRIED</div>
      <div class="logo-sub">Control de Stock</div>
    </div>
  </div>
  <div class="updated-pill">📅 Actualizado: __LAST_UPDATE__</div>
</header>

<div class="statsbar">
  <div class="stat"><div class="stat-n" id="sTotal">—</div><div class="stat-l">Productos</div></div>
  <div class="stat"><div class="stat-n" id="sCritico">—</div><div class="stat-l">Crítico ≤30 días</div></div>
  <div class="stat"><div class="stat-n" id="sAlerta">—</div><div class="stat-l">Alerta 30–60 días</div></div>
  <div class="stat"><div class="stat-n">__TOTAL_VTA__</div><div class="stat-l">Total Vtas/Día</div></div>
</div>

<div class="controls">
  <!-- Fila 1: búsqueda + línea + botón críticos -->
  <div class="ctrl-row">
    <div class="search-wrap">
      <input type="text" id="q" placeholder="Buscar descripción, familia..." oninput="apply()"/>
    </div>
    <div class="vsep"></div>
    <div class="fg">
      <span class="fl">Línea:</span>
      <div class="tabs" id="tabLinea"></div>
    </div>
    <div class="vsep"></div>
    <button class="tab critico-btn" id="btnCritico" onclick="toggleCritico()">🔴 Solo Críticos</button>
    <span class="count-badge" id="badge">— registros</span>
  </div>
  <!-- Fila 2: filtros en cascada (aparece solo si hay línea seleccionada) -->
  <div class="ctrl-row" id="cascadeRow" style="display:none">
    <div class="fg" id="gfGroup" style="display:none">
      <span class="fl">Gran Familia:</span>
      <div class="tabs" id="tabGF"></div>
    </div>
    <div class="vsep" id="famSep" style="display:none; margin:0 8px;"></div>
    <div class="fg" id="famGroup" style="display:none">
      <span class="fl">Familia:</span>
      <div class="tabs" id="tabFam"></div>
    </div>
  </div>
</div>

<div class="tbl-wrap">
  <table id="tbl">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty" id="empty" style="display:none">
    <div class="empty-icon">📭</div>
    <div>No hay productos que coincidan con los filtros seleccionados.</div>
  </div>
</div>

<script>
// Data loaded from __DATA__
const ALL=__DATA__;
const STRUCTURE=__STRUCTURE__;
const COLUMNS=__COLUMNS__;

const LABELS={
  'Rofina':'SAP Rofina',
  'Descripcion':'Descripción',
  'Stock':'Stock',
  'Ventas/Dia':'Venta/Día',
  'Pct':'% Cumplimiento',
  'Est VTA':'Est Venta',
  'Dias Est':'Días Disponibles',
  'Cuarentena':'Cuarentena',
  'Lotes Transito':'Lotes Tránsito',
  'Observaciones':'Observaciones',
  'Gran Familia':'Gran Familia',
  'Familia':'Familia',
  'Linea':'Línea',
};

const NUM=new Set(['Stock','Ventas/Dia','Pct','Est VTA','Dias Est','Cuarentena','Lotes Transito']);
const SHOW=['Rofina','Descripcion','Stock','Ventas/Dia','Est VTA','Dias Est','Pct','Cuarentena','Observaciones'];

let data=[...ALL];
let fLinea='Todas',fGF='Todas',fFam='Todas';
let soloCritico=false;
let sortCol='Dias Est',sortAsc=true;

function fmt(v,col){
  if(!v) return '';
  if(col==='Dias Est'||col==='Cuarentena'||col==='Lotes Transito'){
    const num=parseInt(v);
    return isNaN(num)?'':num.toLocaleString('es-AR');
  }
  if(col==='Stock'||col==='Est VTA'){
    const num=parseInt(v);
    return isNaN(num)?'':num.toLocaleString('es-AR');
  }
  if(col==='Ventas/Dia'){
    const num=parseFloat(v);
    return isNaN(num)?'':(Math.round(num*100)/100).toLocaleString('es-AR');
  }
  if(col==='Pct'){
    const num=parseFloat(v);
    return isNaN(num)?'':(Math.round(num*10)/10).toLocaleString('es-AR')+'%';
  }
  return String(v);
}

function stats(rows){
  const total=ALL.length;
  const critico=rows.filter(r=>{const d=parseFloat(r['Dias Est']);return !isNaN(d)&&d<=30;}).length;
  const alerta=rows.filter(r=>{const d=parseFloat(r['Dias Est']);return !isNaN(d)&&d>30&&d<60;}).length;
  document.getElementById('sTotal').textContent=total.toLocaleString('es-AR');
  document.getElementById('sCritico').textContent=critico;
  document.getElementById('sAlerta').textContent=alerta;
}

// Build Línea tabs
function buildLinea(){
  const lineas=[...new Set(ALL.map(r=>r.Linea).filter(Boolean))].sort();
  mkTabs('tabLinea',['Todas',...lineas],fLinea,v=>{
    fLinea=v; fGF='Todas'; fFam='Todas';
    updateCascade();
    apply();
  });
}

function updateCascade(){
  const cascRow=document.getElementById('cascadeRow');
  const gfGroup=document.getElementById('gfGroup');
  const famGroup=document.getElementById('famGroup');
  const famSep=document.getElementById('famSep');

  if(fLinea==='Todas'){
    cascRow.style.display='none';
    return;
  }
  cascRow.style.display='flex';

  // Gran Familia options for this linea
  const gfs=Object.keys(STRUCTURE[fLinea]||{}).filter(g=>g!=='-').sort();
  if(gfs.length>0){
    gfGroup.style.display='flex';
    mkTabs('tabGF',['Todas',...gfs],fGF,v=>{
      fGF=v; fFam='Todas';
      updateFamilias();
      apply();
    });
  } else {
    gfGroup.style.display='none';
  }
  updateFamilias();
}

function updateFamilias(){
  const famGroup=document.getElementById('famGroup');
  const famSep=document.getElementById('famSep');
  let fams=[];
  if(fLinea!=='Todas' && STRUCTURE[fLinea]){
    if(fGF!=='Todas' && STRUCTURE[fLinea][fGF]){
      fams=STRUCTURE[fLinea][fGF].filter(f=>f!=='-').sort();
    } else {
      // All familias under this linea
      const all=new Set();
      Object.values(STRUCTURE[fLinea]).forEach(arr=>arr.filter(f=>f!=='-').forEach(f=>all.add(f)));
      fams=[...all].sort();
    }
  }
  if(fams.length>0){
    famGroup.style.display='flex';
    famSep.style.display='block';
    mkTabs('tabFam',['Todas',...fams],fFam,v=>{fFam=v;apply();});
  } else {
    famGroup.style.display='none';
    famSep.style.display='none';
  }
}

function mkTabs(id, vals, current, onSelect){
  const el=document.getElementById(id);
  el.innerHTML='';
  vals.forEach(v=>{
    const b=document.createElement('button');
    b.className='tab'+(v===current?' active':'');
    b.textContent=v;
    b.onclick=e=>{
      el.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      e.target.classList.add('active');
      onSelect(v);
    };
    el.appendChild(b);
  });
}

function toggleCritico(){
  soloCritico=!soloCritico;
  document.getElementById('btnCritico').classList.toggle('active',soloCritico);
  apply();
}

function apply(){
  const q=document.getElementById('q').value.toLowerCase();
  let rows=data.filter(r=>{
    if(fLinea!=='Todas'&&r.Linea!==fLinea) return false;
    if(fGF!=='Todas'&&r['Gran Familia']!==fGF) return false;
    if(fFam!=='Todas'&&r['Familia']!==fFam) return false;
    if(soloCritico){const d=parseFloat(r['Dias Est']);if(isNaN(d)||d>30) return false;}
    if(q&&!SHOW.some(c=>String(r[c]||'').toLowerCase().includes(q))) return false;
    return true;
  });
  render(rows);
}

// Build header
const thead=document.getElementById('thead');
const htr=document.createElement('tr');
SHOW.forEach((col,i)=>{
  const th=document.createElement('th');
  th.textContent=LABELS[col]||col;
  th.onclick=()=>sortBy(col,th);
  htr.appendChild(th);
});
thead.appendChild(htr);

function render(rows){
  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';
  document.getElementById('empty').style.display=rows.length?'none':'block';
  document.getElementById('badge').textContent=rows.length.toLocaleString('es-AR')+' registros';
  stats(rows);
  rows.forEach(row=>{
    const tr=document.createElement('tr');
    const d=parseFloat(row['Dias Est']);
    if(!isNaN(d)&&d>=0&&d<=30) tr.classList.add('row-danger');
    else if(!isNaN(d)&&d>30&&d<60) tr.classList.add('row-warn');
    SHOW.forEach(col=>{
      const td=document.createElement('td');
      const raw=row[col];
      const display=fmt(raw,col);
      if(col==='Descripcion'){
        td.className='desc-col';td.textContent=display;
      } else if(col==='Observaciones'){
        td.className='obs-col';td.textContent=display;
      } else if(col==='Pct'){
        td.className='n';td.textContent=display;
      } else if(col==='Dias Est'){
        const n=parseFloat(raw);
        td.className='n '+(isNaN(n)||n<0?'':n<=30?'danger':n<60?'warn':'ok');
        td.textContent=display;
      } else if(NUM.has(col)){
        td.className='n';td.textContent=display;
      } else {
        td.textContent=display;
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

function sortBy(col,th){
  sortAsc=sortCol===col?!sortAsc:true;
  sortCol=col;
  document.querySelectorAll('thead th').forEach(t=>t.classList.remove('asc','desc'));
  th.classList.add(sortAsc?'asc':'desc');
  data=[...data].sort((a,b)=>{
    const av=a[col]??'',bv=b[col]??'';
    const an=parseFloat(av),bn=parseFloat(bv);
    if(!isNaN(an)&&!isNaN(bn)) return sortAsc?an-bn:bn-an;
    return sortAsc?String(av).localeCompare(String(bv)):String(bv).localeCompare(String(av));
  });
  apply();
}

buildLinea();
apply();
</script>
</body>
</html>
