<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Control de Stock — Siegfried</title>
  <style>
    :root {
      --red: #C8102E;
      --red-dark: #a00d24;
      --red-light: #fdf0f2;
      --gray: #f4f6f8;
      --border: #e2e8f0;
      --text: #1a1a2e;
      --muted: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--gray); color: var(--text); }

    /* HEADER */
    header {
      background: white;
      border-bottom: 3px solid var(--red);
      padding: 14px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-circle {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--red);
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 800; font-size: 1rem; letter-spacing: -1px;
    }
    .logo-text { font-size: 1.2rem; font-weight: 700; color: var(--red); letter-spacing: 0.5px; }
    .logo-sub { font-size: 0.75rem; color: var(--muted); }
    .header-right { text-align: right; }
    .update-badge {
      background: var(--red-light); color: var(--red);
      padding: 4px 12px; border-radius: 20px;
      font-size: 0.78rem; font-weight: 600;
    }

    /* STATS BAR */
    .stats-bar {
      background: var(--red);
      padding: 10px 32px;
      display: flex; gap: 32px;
    }
    .stat { color: white; }
    .stat-num { font-size: 1.3rem; font-weight: 700; }
    .stat-label { font-size: 0.72rem; opacity: 0.85; text-transform: uppercase; letter-spacing: 0.5px; }

    /* CONTROLES */
    .controls {
      padding: 16px 32px;
      background: white;
      border-bottom: 1px solid var(--border);
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    }
    .search-wrap { position: relative; }
    .search-wrap input {
      padding: 8px 14px 8px 36px;
      border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 0.88rem;
      width: 280px; outline: none; transition: border 0.2s;
    }
    .search-wrap input:focus { border-color: var(--red); }
    .search-icon {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%); color: var(--muted); font-size: 0.9rem;
    }
    .divider { width: 1px; height: 28px; background: var(--border); }
    .filter-label { font-size: 0.82rem; color: var(--muted); font-weight: 600; }

    /* FILTROS TABS */
    .tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .tab {
      padding: 6px 14px; border-radius: 20px;
      border: 1.5px solid var(--border);
      background: white; color: var(--muted);
      font-size: 0.8rem; cursor: pointer;
      transition: all 0.15s; font-weight: 500;
    }
    .tab:hover { border-color: var(--red); color: var(--red); }
    .tab.active { background: var(--red); color: white; border-color: var(--red); }

    .count-badge {
      margin-left: auto;
      background: var(--red-light); color: var(--red);
      padding: 4px 14px; border-radius: 20px;
      font-size: 0.82rem; font-weight: 600;
    }

    /* TABLA */
    .table-wrapper { overflow-x: auto; padding: 20px 32px 40px; }
    table {
      border-collapse: collapse; width: 100%;
      background: white; border-radius: 12px;
      overflow: hidden; box-shadow: 0 1px 8px rgba(0,0,0,0.07);
      font-size: 0.82rem;
    }
    thead th {
      background: #1a1a2e; color: #e2e8f0;
      padding: 11px 13px; text-align: left;
      white-space: nowrap; cursor: pointer; user-select: none;
      font-weight: 600; font-size: 0.78rem; letter-spacing: 0.3px;
    }
    thead th:hover { background: #2d2d4e; }
    thead th.sorted-asc::after { content: ' ↑'; color: var(--red); }
    thead th.sorted-desc::after { content: ' ↓'; color: var(--red); }
    tbody tr { border-bottom: 1px solid #f1f5f9; transition: background 0.1s; }
    tbody tr:hover { background: var(--red-light); }
    td { padding: 9px 13px; white-space: nowrap; max-width: 240px; overflow: hidden; text-overflow: ellipsis; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; color: #334155; }
    td.desc { max-width: 300px; white-space: normal; line-height: 1.3; }
    td.alert { color: #dc2626; font-weight: 700; }
    td.ok { color: #16a34a; }

    /* STOCK BAJO — resaltar filas */
    tr.stock-low td:first-child { border-left: 3px solid #dc2626; }

    .no-results { text-align: center; padding: 60px; color: var(--muted); font-size: 0.95rem; }
    .no-results span { font-size: 2rem; display: block; margin-bottom: 8px; }

    @media (max-width: 768px) {
      .stats-bar { gap: 16px; padding: 10px 16px; }
      .controls { padding: 12px 16px; }
      .table-wrapper { padding: 12px 8px 32px; }
      header { padding: 12px 16px; }
      .search-wrap input { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-circle">SF</div>
    <div>
      <div class="logo-text">SIEGFRIED</div>
      <div class="logo-sub">Control de Stock</div>
    </div>
  </div>
  <div class="header-right">
    <div class="update-badge">📅 Actualizado: __LAST_UPDATE__</div>
  </div>
</header>

<div class="stats-bar" id="statsBar">
  <div class="stat"><div class="stat-num" id="statTotal">—</div><div class="stat-label">Productos</div></div>
  <div class="stat"><div class="stat-num" id="statCentros">—</div><div class="stat-label">Centros</div></div>
  <div class="stat"><div class="stat-num" id="statAlerta">—</div><div class="stat-label">Stock bajo (&lt;30 días)</div></div>
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar descripción, código..." oninput="applyFilters()"/>
  </div>
  <div class="divider"></div>
  <span class="filter-label">Centro:</span>
  <div class="tabs" id="centroTabs"></div>
  <div class="divider"></div>
  <span class="filter-label">Línea:</span>
  <div class="tabs" id="lineaTabs"></div>
  <span class="count-badge" id="countBadge">— registros</span>
</div>

<div class="table-wrapper">
  <table>
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="no-results" id="noResults" style="display:none">
    <span>📭</span>Sin resultados para esa búsqueda.
  </div>
</div>

<script>
const RAW_DATA = __DATA__;
const COLUMNS = __COLUMNS__;
const NUM_COLS = ['Stock','Ventas/Día','%','Est. VTA','Días/Est.','VTA Prom 3m','Días/Prom3','Cuarentena','Lotes Tránsito'];

let data = RAW_DATA;
let sortCol = null, sortAsc = true;
let filterCentro = 'Todos';
let filterLinea = 'Todas';

// Stats
function updateStats(rows) {
  document.getElementById('statTotal').textContent = rows.length;
  const centros = new Set(rows.map(r => r['Centro']).filter(Boolean));
  document.getElementById('statCentros').textContent = centros.size;
  const alerta = rows.filter(r => {
    const d = parseFloat(r['Días/Est.'] || r['DIAS / ESTIMADO'] || 0);
    return !isNaN(d) && d > 0 && d < 30;
  }).length;
  document.getElementById('statAlerta').textContent = alerta;
}

// Build filter tabs
function buildTabs(containerId, values, current, onSelect) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  ['Todos', ...values].forEach((val, i) => {
    const label = i === 0 ? (containerId === 'centroTabs' ? 'Todos' : 'Todas') : val;
    const btn = document.createElement('button');
    btn.className = 'tab' + (val === current ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => { onSelect(val); applyFilters(); };
    container.appendChild(btn);
  });
}

// Init tabs
const centros = [...new Set(RAW_DATA.map(r => r['Centro']).filter(Boolean))].sort();
const lineas = [...new Set(RAW_DATA.map(r => r['Rofina'] || r['Línea'] || '').filter(Boolean))].sort();

buildTabs('centroTabs', centros, filterCentro, v => {
  filterCentro = v;
  document.querySelectorAll('#centroTabs .tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
});
buildTabs('lineaTabs', lineas, filterLinea, v => {
  filterLinea = v;
  document.querySelectorAll('#lineaTabs .tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
});

// Header
const thead = document.getElementById('tableHead');
const tr = document.createElement('tr');
COLUMNS.forEach((col, i) => {
  const th = document.createElement('th');
  th.textContent = col;
  th.onclick = () => sortBy(i, th);
  tr.appendChild(th);
});
thead.appendChild(tr);

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let filtered = data.filter(row => {
    if (filterCentro !== 'Todos' && String(row['Centro']) !== String(filterCentro)) return false;
    const lineaVal = row['Rofina'] || row['Línea'] || '';
    if (filterLinea !== 'Todas' && lineaVal !== filterLinea) return false;
    if (q && !COLUMNS.some(col => String(row[col]??'').toLowerCase().includes(q))) return false;
    return true;
  });
  renderTable(filtered);
}

function renderTable(rows) {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  document.getElementById('noResults').style.display = rows.length === 0 ? 'block' : 'none';
  document.getElementById('countBadge').textContent = rows.length + ' registros';
  updateStats(rows);

  rows.forEach(row => {
    const tr = document.createElement('tr');
    const dias = parseFloat(row['Días/Est.'] || 0);
    if (!isNaN(dias) && dias > 0 && dias < 30) tr.classList.add('stock-low');

    COLUMNS.forEach(col => {
      const td = document.createElement('td');
      const val = row[col] ?? '';
      td.textContent = val;
      if (NUM_COLS.includes(col)) td.classList.add('num');
      if (col === 'Descripcion') td.classList.add('desc');
      if (col === 'Días/Est.' && !isNaN(parseFloat(val))) {
        const d = parseFloat(val);
        if (d < 30) td.classList.add('alert');
        else if (d >= 90) td.classList.add('ok');
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

function sortBy(colIdx, thEl) {
  const col = COLUMNS[colIdx];
  sortAsc = sortCol === col ? !sortAsc : true;
  sortCol = col;
  document.querySelectorAll('thead th').forEach(t => t.classList.remove('sorted-asc','sorted-desc'));
  thEl.classList.add(sortAsc ? 'sorted-asc' : 'sorted-desc');
  data = [...data].sort((a, b) => {
    const av = a[col]??'', bv = b[col]??'';
    const an = parseFloat(av), bn = parseFloat(bv);
    if (!isNaN(an) && !isNaN(bn)) return sortAsc ? an-bn : bn-an;
    return sortAsc ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
  });
  applyFilters();
}

applyFilters();
</script>
</body>
</html>
