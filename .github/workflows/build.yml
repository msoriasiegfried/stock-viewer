name: Build web desde Excel

on:
  push:
    paths:
      - 'data/**.xlsx'
      - 'data/**.xls'
      - 'data/**.xlsm'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install openpyxl pandas

      - name: Convertir Excel a HTML
        run: python scripts/convert.py

      - name: Deploy a GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
